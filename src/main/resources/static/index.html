<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data KTP</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #007bff; border: none; }
        .table-container { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Manajemen Data KTP</h2>
        
        <div id="feedback" class="mt-3"></div>

        <div class="card mb-5">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0" id="formHeader">Tambah Data KTP</h5>
            </div>
            <div class="card-body">
                <form id="ktpForm">
                    <input type="hidden" id="ktpId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nomorKtp" class="form-label">Nomor KTP</label>
                            <input type="text" class="form-control" id="nomorKtp" placeholder="Contoh: 3201..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                            <input type="text" class="form-control" id="namaLengkap" placeholder="Nama Sesuai KTP" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="alamat" class="form-label">Alamat</label>
                        <textarea class="form-control" id="alamat" rows="2" placeholder="Alamat Lengkap" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tanggalLahir" class="form-label">Tanggal Lahir</label>
                            <input type="date" class="form-control" id="tanggalLahir" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="jenisKelamin" class="form-label">Jenis Kelamin</label>
                            <select class="form-select" id="jenisKelamin" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-end">
                        <button type="button" id="btnCancel" class="btn btn-secondary d-none" onclick="resetForm()">Batal</button>
                        <button type="submit" id="btnSubmit" class="btn btn-primary px-4">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="app"></div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
